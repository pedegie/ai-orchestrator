<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plan Review</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }

    #workflow-id-badge {
      font-size: 0.78rem;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 2px 10px;
      color: #8b949e;
      font-family: monospace;
    }

    #stage-badge {
      margin-left: auto;
      font-size: 0.78rem;
      border-radius: 20px;
      padding: 3px 12px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .stage-waiting { background: #1f3a5f; color: #79c0ff; border: 1px solid #1f6feb; }
    .stage-working { background: #1f2a1f; color: #56d364; border: 1px solid #238636; }
    .stage-done    { background: #1a1f2e; color: #8b949e; border: 1px solid #30363d; }

    main { max-width: 900px; margin: 32px auto; padding: 0 24px 80px; }

    #status-banner {
      display: none;
      padding: 14px 18px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }
    .banner-info    { background: #1f3a5f; border: 1px solid #1f6feb; color: #79c0ff; }
    .banner-success { background: #1a2f1a; border: 1px solid #238636; color: #56d364; }
    .banner-error   { background: #3a1a1a; border: 1px solid #da3633; color: #f85149; }

    #iteration-indicator { font-size: 0.8rem; color: #8b949e; margin-bottom: 8px; }

    .plan-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 24px 28px;
      margin-bottom: 28px;
      line-height: 1.7;
    }

    .plan-box h1, .plan-box h2, .plan-box h3 {
      color: #e6edf3;
      border-bottom: 1px solid #21262d;
      padding-bottom: 6px;
      margin-top: 1.4em;
    }

    .plan-box code {
      background: #1c2128;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.88em;
    }

    .plan-box pre {
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 14px 18px;
      overflow-x: auto;
    }

    .plan-box pre code { background: none; padding: 0; }
    .plan-box a { color: #58a6ff; }
    .plan-box ul, .plan-box ol { padding-left: 1.5em; }

    #feedback-section {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 22px 28px;
    }

    #feedback-section label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: #8b949e;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #feedback {
      width: 100%;
      min-height: 90px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 0.95rem;
      padding: 10px 14px;
      resize: vertical;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    #feedback:focus { outline: none; border-color: #1f6feb; }

    .btn-row { display: flex; gap: 12px; margin-top: 16px; }

    button {
      padding: 9px 20px;
      border-radius: 6px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: filter 0.15s;
    }

    button:disabled { opacity: 0.45; cursor: not-allowed; }
    #btn-approve { background: #238636; border-color: #2ea043; color: #fff; }
    #btn-request { background: #21262d; border-color: #30363d; color: #e6edf3; }
    button:not(:disabled):hover { filter: brightness(1.15); }

    #polling-info {
      display: none;
      margin-top: 18px;
      font-size: 0.87rem;
      color: #8b949e;
      align-items: center;
      gap: 8px;
    }
    #polling-info.visible { display: flex; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>🗂 Plan Review</h1>
  <span id="workflow-id-badge">—</span>
  <span id="stage-badge" class="stage-working">loading…</span>
</header>

<main>
  <div id="status-banner"></div>
  <div id="iteration-indicator"></div>
  <div id="plan-content" class="plan-box">Loading plan…</div>

  <div id="feedback-section">
    <label for="feedback">Feedback (required when requesting changes)</label>
    <textarea id="feedback" placeholder="Describe what should be changed…"></textarea>
    <div class="btn-row">
      <button id="btn-approve">✅ Approve</button>
      <button id="btn-request">🔄 Request Changes</button>
    </div>
    <div id="polling-info">
      <div class="spinner"></div>
      <span id="polling-text">Waiting for architect to revise the plan…</span>
    </div>
  </div>
</main>

<script>
  // Load marked.js dynamically — init() fires only after the library is ready.
  // This avoids any race condition between the CDN script and inline code.
  const markedScript = document.createElement('script');
  markedScript.src = 'https://cdn.jsdelivr.net/npm/marked@12/marked.min.js';
  markedScript.onload = init;
  markedScript.onerror = function () {
    // CDN unreachable — fall back to plain-text rendering
    window.marked = { parse: function(t) { return '<pre>' + t.replace(/</g, '&lt;') + '</pre>'; } };
    init();
  };
  document.head.appendChild(markedScript);

  function init() {
    var params     = new URLSearchParams(location.search);
    var workflowId = (params.get('workflowId') || '').replace(/['"]/g, '').trim();
    var BASE       = '/api/workflows';

    var iteration    = 0;
    var polling      = false;
    var pollInterval = null;

    var badge       = document.getElementById('stage-badge');
    var wfBadge     = document.getElementById('workflow-id-badge');
    var planBox     = document.getElementById('plan-content');
    var banner      = document.getElementById('status-banner');
    var iterEl      = document.getElementById('iteration-indicator');
    var feedbackEl  = document.getElementById('feedback');
    var btnApprove  = document.getElementById('btn-approve');
    var btnRequest  = document.getElementById('btn-request');
    var pollingInfo = document.getElementById('polling-info');
    var pollingText = document.getElementById('polling-text');

    disableButtons();

    if (!workflowId) {
      showBanner('error', 'Missing ?workflowId= in the URL.');
      planBox.textContent = '';
      return;
    }

    wfBadge.textContent = workflowId;
    loadPlan();

    // ── Load plan ────────────────────────────────────────────────────────────
    function loadPlan() {
      iteration++;
      iterEl.textContent = iteration > 1 ? ('Iteration #' + iteration) : '';
      planBox.textContent = 'Loading…';
      hideBanner();
      setStageUI('AWAITING_PLAN_REVIEW');
      disableButtons();

      fetch(BASE + '/' + workflowId + '/plan-content')
        .then(function(r) {
          if (!r.ok) {
            return r.json().catch(function() { return {}; }).then(function(body) {
              throw new Error(body.error || ('Server returned ' + r.status));
            });
          }
          return r.json();
        })
        .then(function(data) {
          planBox.innerHTML = marked.parse(data.content);
          feedbackEl.value = '';
          enableButtons();
        })
        .catch(function(e) {
          showBanner('error', e.message);
          planBox.textContent = '';
        });
    }

    // ── Buttons ──────────────────────────────────────────────────────────────
    btnApprove.addEventListener('click', function() {
      disableButtons();
      stopPolling();
      sendSignal({ action: 'APPROVE' }, function(ok) {
        if (ok) {
          setStageUI('DONE');
          showBanner('success', '✅ Plan approved! The pipeline is continuing…');
          pollingInfo.classList.remove('visible');
        } else {
          enableButtons();
        }
      });
    });

    btnRequest.addEventListener('click', function() {
      var feedback = feedbackEl.value.trim();
      if (!feedback) {
        feedbackEl.focus();
        feedbackEl.style.borderColor = '#da3633';
        setTimeout(function() { feedbackEl.style.borderColor = ''; }, 1500);
        return;
      }
      disableButtons();
      sendSignal({ action: 'REQUEST_CHANGES', feedback: feedback }, function(ok) {
        if (ok) {
          setStageUI('ARCHITECT');
          showBanner('info', '🔄 Feedback sent. Waiting for the architect to revise the plan…');
          startPolling();
        } else {
          enableButtons();
        }
      });
    });

    // ── Send signal ──────────────────────────────────────────────────────────
    function sendSignal(body, cb) {
      fetch(BASE + '/' + workflowId + '/plan-review', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      })
        .then(function(r) {
          if (!r.ok) {
            return r.json().catch(function() { return {}; }).then(function(err) {
              showBanner('error', err.error || ('Signal failed — server returned ' + r.status));
              cb(false);
            });
          } else {
            cb(true);
          }
        })
        .catch(function(e) {
          showBanner('error', 'Network error: ' + e.message);
          cb(false);
        });
    }

    // ── Polling after REQUEST_CHANGES ────────────────────────────────────────
    function startPolling() {
      if (polling) return;
      polling = true;
      pollingInfo.classList.add('visible');
      pollingText.textContent = 'Waiting for architect to revise the plan…';

      pollInterval = setInterval(function() {
        fetch(BASE + '/' + workflowId + '/plan-review-ready')
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(data) {
            if (!data) return;
            pollingText.textContent = 'Current stage: ' + data.stage;
            if (data.ready) {
              stopPolling();
              pollingInfo.classList.remove('visible');
              loadPlan();
            }
          })
          .catch(function() { /* network hiccup — retry next tick */ });
      }, 3000);
    }

    function stopPolling() {
      polling = false;
      clearInterval(pollInterval);
      pollInterval = null;
    }

    // ── Helpers ──────────────────────────────────────────────────────────────
    function setStageUI(s) {
      badge.textContent = s;
      badge.className = '';
      if (s === 'AWAITING_PLAN_REVIEW')    badge.classList.add('stage-waiting');
      else if (s === 'DONE')               badge.classList.add('stage-done');
      else                                 badge.classList.add('stage-working');
    }

    function showBanner(type, msg) {
      banner.textContent = msg;
      banner.className = 'banner-' + type;
      banner.style.display = 'block';
    }

    function hideBanner() { banner.style.display = 'none'; }

    function disableButtons() { btnApprove.disabled = true;  btnRequest.disabled = true; }
    function enableButtons()  { btnApprove.disabled = false; btnRequest.disabled = false; }
  }
</script>
</body>
</html>
