services:
  postgresql:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
      POSTGRES_DB: temporal
    volumes:
      - postgres-data:/var/lib/postgresql/data

  temporal-setup:
    image: temporalio/auto-setup:1.25
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
      - SKIP_DEFAULT_NAMESPACE_CREATION=false
    depends_on:
      - postgresql

  temporal:
    image: temporalio/server:1.25
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
    depends_on:
      - temporal-setup

  temporal-init:
    image: temporalio/admin-tools:1.25
    entrypoint: ["temporal", "operator", "search-attribute", "create", "--namespace", "default", "--name", "Stage", "--type", "Keyword", "--address", "temporal:7233"]
    depends_on:
      - temporal
    restart: on-failure

  temporal-ui:
    image: temporalio/ui:2.47.2
    ports:
      - "8088:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal

volumes:
  postgres-data:
